<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact – Rurangwa Loick</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page page-contact">
      <section class="contact-shell">
        <nav class="top-nav" aria-label="Main">
          <a href="index.html" class="nav-item" aria-label="Home">
            <img src="images/home-icon.png" alt="" class="nav-icon" />
          </a>
          <a href="projects.html" class="nav-item" aria-label="Projects">
            <img src="images/projects-icon.png" alt="" class="nav-icon" />
          </a>
          <a href="contact.html" class="nav-item nav-item-active" aria-label="Contact">
            <img src="images/contact-icon.png" alt="" class="nav-icon" />
          </a>
        </nav>

        <div class="contact-layout">
          <aside class="profile-card contact-card">
            <div class="profile-image contact-card-image">
              <img
                class="profile-photo"
                src="images/ArtByMe-1.jpg"
                alt="Portrait of Rurangwa Loick"
              />
              <div class="profile-image-overlay"></div>
            </div>
            <h2 class="profile-name contact-card-name">Rurangwa Loick</h2>
            <p class="profile-role contact-card-role">Photographer &amp; Videographer</p>
            <p class="profile-location contact-card-location">Ottawa, Canada</p>

            <div class="contact-details">
              <a href="mailto:loick.rurangwa@gmail.com" class="contact-detail contact-detail-email">
                loick.rurangwa@gmail.com
              </a>
              <a href="tel:+1234567890" class="contact-detail contact-detail-phone">
                +1(343) 254-3073
              </a>
            </div>

            <div class="social-row contact-card-social" aria-label="Social links">
              <a
                href="https://www.linkedin.com/in/rurangwa-loick-b73a8a331/"
                target="_blank"
                rel="noopener noreferrer"
                aria-label="LinkedIn"
              >
                <img src="images/linkedin-icon.png" alt="" class="social-icon" />
              </a>
              
              <a
                href="https://www.instagram.com/framedbyloick/"
                target="_blank"
                rel="noopener noreferrer"
                aria-label="Instagram"
              >
                <img src="images/instagram-icon.png" alt="" class="social-icon" />
              </a>
              <a href="mailto:loick.rurangwa@gmail.com" aria-label="Email">
                <img src="images/mail-icon.png" alt="" class="social-icon" />
              </a>
            </div>

          </aside>

          <div class="contact-message">
            <h2 class="contact-message-title">Send a Message</h2>
            <p class="contact-message-desc">
              Have a project in mind or want to collaborate? Drop me a message and I’ll get back to you.
            </p>
            <form class="contact-form" action="mailto:loick.rurangwa@gmail.com" method="post" enctype="text/plain">
              <div class="contact-form-row">
                <div class="contact-form-field">
                  <label class="contact-form-label" for="contact-name">Name</label>
                  <input type="text" id="contact-name" name="name" class="contact-form-input" required placeholder="Your name" />
                </div>
                <div class="contact-form-field">
                  <label class="contact-form-label" for="contact-email">Email</label>
                  <input type="email" id="contact-email" name="email" class="contact-form-input" required placeholder="your@email.com" />
                </div>
              </div>
              <div class="contact-form-field">
                <label class="contact-form-label" for="contact-msg">Message</label>
                <textarea id="contact-msg" name="message" class="contact-form-textarea" rows="4" required placeholder="Your message..."></textarea>
              </div>
              <button type="submit" class="btn btn-primary contact-form-btn">Send Message</button>
            </form>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
